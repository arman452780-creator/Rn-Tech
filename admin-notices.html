<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notices | RN-TECH Admin</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="admin-common.css">
</head>
<body>
    <aside class="sidebar">
        <a href="index.html" class="logo">RN-TECH<span style="color: #00f2ff;">.</span> Admin</a>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="admin-dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-students.html" class="nav-link">
                    <i class="fas fa-user-graduate"></i> <span>Students</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-courses.html" class="nav-link">
                    <i class="fas fa-book"></i> <span>Courses</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-notices.html" class="nav-link active">
                    <i class="fas fa-bullhorn"></i> <span>Notices</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-batches.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i> <span>Upcoming Batches</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-gallery.html" class="nav-link">
                    <i class="fas fa-images"></i> <span>Gallery</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-messages.html" class="nav-link">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a>
            </div>
        </nav>
        <div class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Notices</h1>
                <p style="color: var(--color-text-dim); margin-top: 0.5rem;">Broadcast important announcements.</p>
            </div>
            <button class="btn-primary" id="addNoticeBtn">
                <i class="fas fa-plus"></i> Create Notice
            </button>
        </header>

        <section id="noticesList" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <!-- Skeleton items -->
            <div class="glass-card skeleton" style="height: 120px;"></div>
            <div class="glass-card skeleton" style="height: 120px;"></div>
        </section>
    </main>

    <!-- Modal: Create/Edit Notice -->
    <div class="modal-overlay" id="noticeModal">
        <div class="modal-content" style="max-width: 700px;">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <h2 id="modalTitle" style="margin-bottom: 2rem;">Create Announcement</h2>
            <form id="noticeForm">
                <input type="hidden" id="noticeId">
                <div class="input-group">
                    <label class="input-label">Title</label>
                    <input type="text" id="noticeTitle" class="form-input" required placeholder="e.g. Exam Schedule Released">
                </div>
                <div class="input-group">
                    <label class="input-label">Description / Content</label>
                    <textarea id="noticeDescription" class="form-input" rows="5" required placeholder="Type your announcement here..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label class="input-label">Target Audience</label>
                        <select id="noticeTarget" class="form-input">
                            <option value="all">All Students</option>
                            <option value="course">Specific Course</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Expiry Date</label>
                        <input type="date" id="noticeExpiry" class="form-input">
                    </div>
                </div>
                <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                    <div class="input-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="noticePinned" style="width: 20px; height: 20px; accent-color: var(--color-accent);">
                        <label class="input-label" style="margin-bottom: 0; cursor: pointer;" for="noticePinned">Pin to Top</label>
                    </div>
                    <div class="input-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="noticePublished" checked style="width: 20px; height: 20px; accent-color: var(--color-accent);">
                        <label class="input-label" style="margin-bottom: 0; cursor: pointer;" for="noticePublished">Publish Immediately</label>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save & Broadcast</button>
                    <button type="button" class="btn-outline modal-close-btn" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { authService } from './js/auth-service.js';
        import { adminService } from './js/admin-service.js';
        import { getSupabase } from './js/supabase-client.js';
        import CONFIG from './js/config.js';

        const noticesList = document.getElementById('noticesList');
        const modal = document.getElementById('noticeModal');
        const noticeForm = document.getElementById('noticeForm');

        let notices = [];
        let realtimeChannel = null;

        async function init() {
            const user = await authService.getCurrentUser();
            if (!user) { window.location.href = 'admin-login.html'; return; }
            
            const projectID = CONFIG.SUPABASE_URL.split('.')[0].split('//')[1];
            console.log("ACTIVE SUPABASE PROJECT:");
            console.log("URL:", CONFIG.SUPABASE_URL);
            console.log("Project ID:", projectID);

            // Test Fetch
            const supabase = getSupabase();
            const { data: testData, error: testError } = await supabase.from('notices').select('*').limit(1);
            console.log("TEST NOTICE FETCH", testData, testError);

            // Available Tables Test (May require RPC function 'get_tables' to be defined in Supabase)
            try {
                const { data: tables, error: tableError } = await supabase.rpc('get_tables');
                console.log("AVAILABLE TABLES", tables || "RPC Failed or Not Defined", tableError || "");
            } catch (e) {
                console.log("Tables fetch RPC failed (this is expected if get_tables is not set up)");
            }

            loadNotices();
            setupRealtime();
            console.log("Notices Module Loaded");
            console.log("Fetching Admin Notices");
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                if (realtimeChannel) {
                    const supabase = getSupabase();
                    await supabase.removeChannel(realtimeChannel);
                    console.log("Realtime Subscriptions Removed");
                }
                await authService.signOut();
                console.log("Redirecting To Admin Login");
                window.location.replace('admin-login.html');
            } catch (err) {
                console.error('Logout error:', err);
                window.location.replace('admin-login.html');
            }
        });

        async function loadNotices() {
            console.log("Connecting to notices table...");
            try {
                notices = await adminService.getAllNotices();
                console.log("All Notices:", notices);
                const publishedNotices = notices.filter(n => n.published);
                console.log("Published Notices:", publishedNotices);
                renderNotices();
            } catch (err) {
                console.error("Load failed:", err);
            }
        }

        function renderNotices() {
            if (notices.length === 0) {
                noticesList.innerHTML = '<div style="text-align: center; padding: 5rem; color: var(--color-text-dim); opacity: 0.5;">No notices found. All broadcasted announcements will appear here.</div>';
                return;
            }

            noticesList.innerHTML = notices.map(n => {
                const isExpired = n.expires_at && new Date(n.expires_at) < new Date();
                const isLive = n.published && !isExpired;
                
                let statusBadge = '';
                if (n.pinned) {
                    statusBadge = '<span style="font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: rgba(0,242,255,0.1); color: #00f2ff; font-weight: 600;">PINNED</span>';
                } else if (isExpired) {
                    statusBadge = '<span style="font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: rgba(255,77,77,0.1); color: #ff4d4d; font-weight: 600;">EXPIRED</span>';
                } else if (isLive) {
                    statusBadge = '<span style="font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: rgba(40,167,69,0.1); color: #28a745; font-weight: 600;">LIVE</span>';
                } else {
                    statusBadge = '<span style="font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--color-text-dim); font-weight: 600;">DRAFT</span>';
                }

                return `
                    <div class="glass-card" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; border-left: ${n.pinned ? '4px solid var(--color-accent)' : '1px solid var(--color-border)'};">
                        <div style="flex: 1;">
                            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem;">
                                ${n.pinned ? '<i class="fas fa-thumbtack" style="color: var(--color-accent); font-size: 0.8rem;"></i>' : ''}
                                <h3 style="margin: 0; font-size: 1.1rem; color: var(--color-text);">${n.title}</h3>
                                ${statusBadge}
                            </div>
                            <p style="color: var(--color-text-dim); font-size: 0.85rem; line-height: 1.5; margin-bottom: 1rem;">${n.description}</p>
                            <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.3);">
                                <span><i class="fas fa-calendar-alt"></i> Created: ${new Date(n.created_at).toLocaleDateString()}</span>
                                <span><i class="fas fa-bullseye"></i> Target: ${n.target_courses && n.target_courses.length > 0 ? n.target_courses.join(', ') : 'Global'}</span>
                                ${n.expires_at ? `<span style="color: ${isExpired ? '#ff4d4d' : 'inherit'}"><i class="fas fa-clock"></i> Expires: ${new Date(n.expires_at).toLocaleDateString()}</span>` : ''}
                            </div>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button onclick="editNotice('${n.id}')" class="btn-icon" style="background: rgba(0,242,255,0.1); border: none; color: var(--color-accent); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.3s;"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteNotice('${n.id}')" class="btn-icon" style="background: rgba(255,77,77,0.1); border: none; color: #ff4d4d; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.3s;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupRealtime() {
            const supabase = getSupabase();
            realtimeChannel = supabase.channel('notice-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'notices' }, () => {
                loadNotices();
            }).subscribe();
            
            console.log("Realtime Subscription Active");
            console.log("Realtime Notice Sync Active");
            console.log("Realtime Notices Active");
        }

        // Event Listeners
        document.getElementById('addNoticeBtn').addEventListener('click', () => {
            noticeForm.reset();
            document.getElementById('noticeId').value = '';
            document.getElementById('modalTitle').textContent = 'Create Announcement';
            modal.style.display = 'flex';
        });

        document.querySelectorAll('.modal-close, .modal-close-btn').forEach(btn => {
            btn.addEventListener('click', () => modal.style.display = 'none');
        });

        noticeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('noticeId').value;
            
            const noticeData = {
                title: document.getElementById('noticeTitle').value,
                description: document.getElementById('noticeDescription').value,
                pinned: document.getElementById('noticePinned').checked,
                published: document.getElementById('noticePublished').checked,
                expires_at: document.getElementById('noticeExpiry').value || null,
                target_courses: document.getElementById('noticeTarget').value === 'all' ? [] : ['General'], 
                target_batches: [],
                updated_at: new Date()
            };

            console.log("Saving notice...");
            console.log("Payload:", noticeData);

            try {
                let response;
                if (id) {
                    response = await adminService.updateNotice(id, noticeData);
                } else {
                    noticeData.created_at = new Date();
                    response = await adminService.addNotice(noticeData);
                }

                const { data, error } = response;
                console.log("Insert response:", data);
                console.log("Insert error:", error);

                if (error) throw error;

                console.log("Notice Saved Successfully");
                console.log("Admin Notice Saved");
                
                modal.style.display = 'none';
                noticeForm.reset();
                loadNotices();
            } catch (err) {
                console.error("Save error:", err);
                // Elegant RN-TECH Toast Error
                const errorDiv = document.createElement('div');
                errorDiv.style.cssText = 'position: fixed; top: 20px; right: 20px; background: rgba(20, 20, 25, 0.85); color: #fff; padding: 1.2rem 2.5rem; border-radius: 12px; z-index: 9999; backdrop-filter: blur(20px); border: 1px solid rgba(255, 77, 77, 0.3); box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(-20px); opacity: 0;';
                errorDiv.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fas fa-exclamation-circle" style="color: #ff4d4d; font-size: 1.5rem;"></i>
                        <div>
                            <p style="margin: 0; font-weight: 700; font-size: 0.9rem; color: #ff4d4d; text-transform: uppercase; letter-spacing: 1px;">Update Failed</p>
                            <p style="margin: 0; font-size: 0.8rem; color: rgba(255,255,255,0.7);">${err.message}</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(errorDiv);
                
                // Trigger animation
                requestAnimationFrame(() => {
                    errorDiv.style.transform = 'translateY(0)';
                    errorDiv.style.opacity = '1';
                });

                setTimeout(() => {
                    errorDiv.style.transform = 'translateY(-20px)';
                    errorDiv.style.opacity = '0';
                    setTimeout(() => errorDiv.remove(), 500);
                }, 5000);
            }
        });

        window.editNotice = (id) => {
            const n = notices.find(x => x.id === id);
            if (!n) return;

            document.getElementById('noticeId').value = n.id;
            document.getElementById('noticeTitle').value = n.title;
            document.getElementById('noticeDescription').value = n.description;
            document.getElementById('noticePinned').checked = n.pinned;
            document.getElementById('noticePublished').checked = n.published;
            document.getElementById('noticeExpiry').value = n.expires_at ? n.expires_at.split('T')[0] : '';

            document.getElementById('modalTitle').textContent = 'Edit Announcement';
            modal.style.display = 'flex';
        };

        window.deleteNotice = async (id) => {
            if (confirm("Are you sure you want to delete this notice?")) {
                try {
                    await adminService.deleteNotice(id);
                } catch (err) {
                    alert("Error deleting notice: " + err.message);
                }
            }
        };

        init();
    </script>
</body>
</html>
