<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | RN-TECH</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --admin-accent: #00f2ff;
            --admin-accent-glow: rgba(0, 242, 255, 0.5);
            --admin-bg-dark: #05050a;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--admin-bg-dark);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }

        /* Animated Background */
        .admin-bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111122 0%, #05050a 100%);
        }

        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--admin-accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .admin-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--admin-accent);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .login-title {
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            color: #fff;
            font-weight: 700;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 1.1rem 1.4rem;
            padding-right: 3.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--admin-accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        .password-toggle {
            position: absolute;
            right: 1.4rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.3s;
            font-size: 1.1rem;
        }

        .password-toggle:hover {
            color: var(--admin-accent);
        }

        .btn-admin {
            width: 100%;
            padding: 1.1rem;
            background: var(--admin-accent);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-admin::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .btn-admin:hover::before {
            left: 100%;
        }

        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-admin:active {
            transform: translateY(0);
        }

        .btn-admin:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error States */
        .error-message {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-card {
                padding: 2.5rem 1.8rem;
                margin: 1.5rem;
            }
            .login-title {
                font-size: 2rem;
            }
        }
    </style>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-bg-canvas">
        <div class="glow-sphere" style="top: 10%; left: 10%;"></div>
        <div class="glow-sphere" style="bottom: 10%; right: 10%; background: radial-gradient(circle, #6000ff33 0%, transparent 70%);"></div>
    </div>

    <div class="login-card">
        <div class="admin-badge">Admin Access</div>
        <h1 class="login-title">Control <span class="accent-color">Portal</span></h1>
        <p class="login-subtitle">Enter your credentials to manage RN-TECH.</p>

        <div id="errorMessage" class="error-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-control" placeholder="admin@rntech.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Security Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-admin">
                <span>Authorize Access</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>

        <div style="margin-top: 2rem;">
            <a href="index.html" style="color: rgba(255, 255, 255, 0.4); text-decoration: none; font-size: 0.85rem; transition: color 0.3s;">
                <i class="fas fa-arrow-left"></i> Return to Main Website
            </a>
        </div>
    </div>

    <script type="module">
        import { authService } from './js/auth-service.js';

        const loginForm = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        // Toggle Password Visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;

            // UI State: Loading
            loginBtn.disabled = true;
            loginBtn.querySelector('span').textContent = 'Authenticating...';
            btnSpinner.style.display = 'block';
            errorMessage.style.display = 'none';

            try {
                // 1. Sign in with Supabase
                const { user, session } = await authService.signIn(email, password);

                // 2. Redirect to admin dashboard on successful authentication
                window.location.href = 'admin-dashboard.html';
                
            } catch (error) {
                console.error('Admin Login Error:', error);
                errorMessage.textContent = error.message || 'Authentication failed. Please try again.';
                errorMessage.style.display = 'block';
                
                // UI State: Reset
                loginBtn.disabled = false;
                loginBtn.querySelector('span').textContent = 'Authorize Access';
                btnSpinner.style.display = 'none';
            }
        });

        // Session Persistence Check
        window.addEventListener('load', async () => {
            const user = await authService.getCurrentUser();
            if (user) {
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
