<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | RN-TECH</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="Favicon.jpg">
    <meta name="description" content="">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Global Theme System -->
    <link rel="stylesheet" href="global.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">
</head>

<body class="dark-theme">

    <!-- Navigation -->
    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-inner">
                    <div class="logo-front">RN-TECH<span class="accent">.</span></div>
                    <div class="logo-back">Raiyam, Madhubani</div>
                </div>
            </a>

            <button class="mobile-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span class="hamburger"></span>
            </button>

            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="courses.html" class="nav-link">Courses</a>
                <a href="faculties.html" class="nav-link">Faculties</a>
                <a href="https://attendance-app-22f96.web.app/index.html" class="nav-link" target="_blank" rel="noopener noreferrer">Attendance</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="apply-section section bg-darker" id="register">
            <div class="container apply-container">
                <div class="apply-form-wrapper reveal-fade-up">
                    <div class="section-header text-center">
                        <span class="subtitle">Enroll Now</span>
                        <h2 class="section-title">Register for Course</h2>
                    </div>

                    <form id="courseRegisterForm" action="" method="post" enctype="multipart/form-data" class="contact-form">
                        <div class="registration-grid">
                            <div class="col-full">
                                <input type="hidden" name="edit" value="" readonly="">
                                <strong style="color:var(--color-accent); font-size: 1.2rem;">1. PERSONAL DETAILS</strong>
                                <hr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin: 10px 0 20px 0;">
                            </div>

                            <div class="form-group">
                                <label>ADMISSION YEAR <span class="err" style="color:red">*</span></label>
                                <input name="username" type="hidden" id="username" value="4596">
                                <input name="branch" type="hidden" id="branch" value="5">
                                <select name="asession" id="asession" required class="form-control">
                                    <option value="">Select year</option>
                                    <option value="2023">2023-2024</option>
                                    <option value="2024">2024-2025</option>
                                    <option value="2025">2025-2026</option>
                                    <option value="2026">2026-2027</option>
                                    <option value="2027">2027-2028</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Student Name <span class="err" style="color:red">*</span></label>
                                <input name="name" type="text" id="name" required class="form-control title-case-input">
                            </div>

                            <div class="form-group">
                                <label>Father's Name <span class="err" style="color:red">*</span></label>
                                <input name="father" type="text" id="father" required class="form-control title-case-input">
                            </div>

                            <div class="form-group">
                                <label>Gender <span class="err" style="color:red">*</span></label>
                                <select name="gender" required class="form-control">
                                    <option value="">Select</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Date Of Birth <span class="err" style="color:red">*</span></label>
                                <input name="dob" type="date" required class="form-control">
                            </div>

                            <div class="form-group">
                                <label>Mobile No <span class="err" style="color:red">*</span></label>
                                <input name="contact" type="text" id="contact" required pattern="\d{10}" maxlength="10" class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);">
                            </div>

                            <div class="form-group">
                                <label>Guardian Mobile No <span class="err" style="color:red">*</span></label>
                                <input name="guardian_contact" type="text" id="guardian_contact" required pattern="\d{10}" maxlength="10" class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);">
                            </div>

                            <div class="form-group">
                                <label>State <span class="err" style="color:red">*</span></label>
                                <input name="state" type="text" class="form-control title-case-input" required list="state-list" placeholder="Select or type state">
                                <datalist id="state-list">
                                    <option value="Bihar"></option>
                                    <option value="Uttar Pradesh"></option>
                                </datalist>
                            </div>

                            <div class="form-group">
                                <label>District</label>
                                <input name="district" type="text" class="form-control title-case-input" list="district-list" placeholder="Select or type district">
                                <datalist id="district-list">
                                    <option value="Madhubani"></option>
                                    <option value="Darbhanga"></option>
                                    <option value="Patna"></option>
                                </datalist>
                            </div>

                            <div class="form-group">
                                <label>Address</label>
                                <textarea name="address" id="address" class="form-control title-case-input" rows="1"></textarea>
                            </div>

                            <div class="col-full">
                                <strong style="color:var(--color-accent); font-size: 1.2rem;">2. COURSE DETAILS</strong>
                                <hr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin: 10px 0 20px 0;">
                            </div>

                            <div class="form-group">
                                <label>Course Category <span class="err" style="color:red">*</span></label>
                                <select required name="program" id="program" class="form-control">
                                    <option value="">-- COURSE CATEGORY --</option>
                                    <option value="3" data-fee="1500">Basic Course</option>
                                    <option value="4" data-fee="2500">Certificate Course</option>
                                    <option value="5" data-fee="4500">Diploma Course</option>
                                    <option value="6" data-fee="3500">Language Course</option>
                                    <option value="7" data-fee="5500">Professional Course</option>
                                    <option value="8" data-fee="2000">Typing Course</option>
                                    <option value="9" data-fee="3000">Training Course</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Course <span class="err" style="color:red">*</span></label>
                                <input type="text" id="registerCourse" name="courses" class="form-control" readonly>
                            </div>

                            <div class="form-group">
                                <label>Course Duration</label>
                                <input type="text" id="courseDuration" name="duration" class="form-control" readonly>
                            </div>

                            <div class="form-group">
                                <label>NET FEE</label>
                                <input type="number" id="fee" name="fee" class="form-control">
                            </div>

                            <div class="form-group">
                                <label>Date of Admission <span class="err" style="color:red">*</span></label>
                                <input name="doj" type="date" id="doj" required class="form-control" readonly>
                            </div>

                            <div class="action-bar col-full">
                                <a href="courses.html" class="btn btn-exit">Exit</a>
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>

                            <div class="col-full" style="text-align: center; color: var(--color-text-muted); font-size: 0.85rem;">
                                <hr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin: 10px 0;">
                                <span class="err" style="color:red">*</span> denotes required field
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-container">

        </div>
        <div class="footer-bottom container">
            <p>&copy; 2026 Devlop by Armaan. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script type="module" src="js/main.js"></script>

    <script type="module" src="js/registration.js"></script>
</body>

</html>
