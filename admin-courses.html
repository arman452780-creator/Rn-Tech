<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses | RN-TECH Admin</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="admin-common.css">
</head>
<body>
    <aside class="sidebar">
        <a href="index.html" class="logo">RN-TECH<span style="color: #00f2ff;">.</span> Admin</a>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="admin-dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-students.html" class="nav-link">
                    <i class="fas fa-user-graduate"></i> <span>Students</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-courses.html" class="nav-link active">
                    <i class="fas fa-book"></i> <span>Courses</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-notices.html" class="nav-link">
                    <i class="fas fa-bullhorn"></i> <span>Notices</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-gallery.html" class="nav-link">
                    <i class="fas fa-images"></i> <span>Gallery</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-messages.html" class="nav-link">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a>
            </div>
        </nav>
        <div class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Courses</h1>
                <p style="color: var(--color-text-dim); margin-top: 0.5rem;">Create and manage educational programs.</p>
            </div>
            <button class="btn-primary" id="addCourseBtn">
                <i class="fas fa-plus"></i> Add Course
            </button>
        </header>

        <section id="courseGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem;">
            <!-- Skeleton Cards -->
            <div class="glass-card skeleton" style="height: 250px;"></div>
            <div class="glass-card skeleton" style="height: 250px;"></div>
            <div class="glass-card skeleton" style="height: 250px;"></div>
        </section>
    </main>

    <!-- Modal: Add/Edit Course -->
    <div class="modal-overlay" id="courseModal">
        <div class="modal-content">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <h2 id="modalTitle" style="margin-bottom: 2rem;">Add New Course</h2>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                <div class="input-group">
                    <label class="input-label">Course Name</label>
                    <input type="text" id="courseName" class="form-input" required placeholder="e.g. ADCA (Advanced Diploma)">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label class="input-label">Duration</label>
                        <input type="text" id="courseDuration" class="form-input" required placeholder="e.g. 12 Months">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Instructor</label>
                        <input type="text" id="courseInstructor" class="form-input" required placeholder="e.g. Prof. Smith">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Subjects (Comma separated)</label>
                    <input type="text" id="courseSubjects" class="form-input" placeholder="e.g. HTML, CSS, JavaScript">
                </div>
                <div class="input-group">
                    <label class="input-label">Batches (Comma separated)</label>
                    <input type="text" id="courseBatches" class="form-input" placeholder="e.g. Morning, Evening">
                </div>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-top: 1rem;">
                    <input type="checkbox" id="courseActive" checked style="width: 20px; height: 20px; accent-color: var(--color-accent);">
                    <label class="input-label" style="margin-bottom: 0; cursor: pointer;" for="courseActive">Active Course</label>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Course</button>
                    <button type="button" class="btn-outline modal-close-btn" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { authService } from './js/auth-service.js';
        import { adminService } from './js/admin-service.js';
        import { getSupabase } from './js/supabase-client.js';

        const courseGrid = document.getElementById('courseGrid');
        const modal = document.getElementById('courseModal');
        const courseForm = document.getElementById('courseForm');

        let courses = [];
        let realtimeChannel = null;

        async function init() {
            const user = await authService.getCurrentUser();
            if (!user) { window.location.href = 'admin-login.html'; return; }
            
            loadCourses();
            setupRealtime();
            console.log("Courses Synced");
        }

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                if (realtimeChannel) {
                    const supabase = getSupabase();
                    await supabase.removeChannel(realtimeChannel);
                    console.log("Realtime Subscriptions Removed");
                }
                await authService.signOut();
                console.log("Redirecting To Admin Login");
                window.location.replace('admin-login.html');
            } catch (err) {
                console.error('Logout error:', err);
                window.location.replace('admin-login.html');
            }
        });

        async function loadCourses() {
            try {
                courses = await adminService.getAllCourses();
                renderCourses();
            } catch (err) {
                console.error("Load failed:", err);
            }
        }

        function renderCourses() {
            if (courses.length === 0) {
                courseGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 5rem; color: var(--color-text-dim);">No courses created yet. Click "Add Course" to begin.</div>';
                return;
            }

            courseGrid.innerHTML = courses.map(c => `
                <div class="glass-card" style="position: relative;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div>
                            <span style="font-size: 0.7rem; color: var(--color-accent); text-transform: uppercase; letter-spacing: 1px;">${c.duration || 'N/A'}</span>
                            <h3 style="margin: 5px 0 0; font-size: 1.4rem;">${c.course_name}</h3>
                        </div>
                        <span style="padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; background: ${c.active ? 'rgba(40,167,69,0.1)' : 'rgba(255,77,77,0.1)'}; color: ${c.active ? '#28a745' : '#ff4d4d'};">
                            ${c.active ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                    
                    <div style="margin-bottom: 1.5rem;">
                        <p style="color: var(--color-text-dim); font-size: 0.9rem; margin-bottom: 0.5rem;"><i class="fas fa-user-tie" style="width: 20px;"></i> ${c.instructor || 'Unassigned'}</p>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${(c.subjects || []).slice(0, 3).map(s => `<span style="font-size: 0.75rem; color: var(--color-text-dim); background: rgba(255,255,255,0.05); padding: 2px 10px; border-radius: 6px;">${s}</span>`).join('')}
                            ${c.subjects && c.subjects.length > 3 ? `<span style="font-size: 0.75rem; color: var(--color-text-dim);">+${c.subjects.length - 3} more</span>` : ''}
                        </div>
                    </div>

                    <div style="display: flex; border-top: 1px solid var(--color-border); padding-top: 1.5rem; justify-content: space-between; align-items: center;">
                        <div style="font-size: 0.8rem; color: var(--color-text-dim);">
                            <i class="fas fa-users"></i> ${c.enrolled_count || 0} Students
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button onclick="editCourse('${c.id}')" class="btn-icon" style="background: none; border: none; color: var(--color-accent); cursor: pointer;"><i class="fas fa-edit"></i> Edit</button>
                            <button onclick="deleteCourse('${c.id}')" class="btn-icon" style="background: none; border: none; color: #ff4d4d; cursor: pointer;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupRealtime() {
            const supabase = getSupabase();
            realtimeChannel = supabase.channel('course-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'courses' }, () => {
                loadCourses();
            }).subscribe();
            
            console.log("Realtime Subscription Active");
        }

        // Event Listeners
        document.getElementById('addCourseBtn').addEventListener('click', () => {
            courseForm.reset();
            document.getElementById('courseId').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Course';
            modal.style.display = 'flex';
        });

        document.querySelectorAll('.modal-close, .modal-close-btn').forEach(btn => {
            btn.addEventListener('click', () => modal.style.display = 'none');
        });

        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('courseId').value;
            const subjects = document.getElementById('courseSubjects').value.split(',').map(s => s.trim()).filter(s => s);
            const batches = document.getElementById('courseBatches').value.split(',').map(b => b.trim()).filter(b => b);
            
            const courseData = {
                course_name: document.getElementById('courseName').value,
                duration: document.getElementById('courseDuration').value,
                instructor: document.getElementById('courseInstructor').value,
                subjects: subjects,
                batches: batches,
                active: document.getElementById('courseActive').checked,
                updated_at: new Date()
            };

            try {
                if (id) {
                    await adminService.updateCourse(id, courseData);
                } else {
                    courseData.created_at = new Date();
                    await adminService.addCourse(courseData);
                }
                modal.style.display = 'none';
            } catch (err) {
                alert("Error saving course: " + err.message);
            }
        });

        window.editCourse = (id) => {
            const c = courses.find(x => x.id === id);
            if (!c) return;

            document.getElementById('courseId').value = c.id;
            document.getElementById('courseName').value = c.course_name;
            document.getElementById('courseDuration').value = c.duration;
            document.getElementById('courseInstructor').value = c.instructor;
            document.getElementById('courseSubjects').value = (c.subjects || []).join(', ');
            document.getElementById('courseBatches').value = (c.batches || []).join(', ');
            document.getElementById('courseActive').checked = c.active;

            document.getElementById('modalTitle').textContent = 'Edit Course';
            modal.style.display = 'flex';
        };

        window.deleteCourse = async (id) => {
            if (confirm("Are you sure you want to delete this course? This might affect enrolled students.")) {
                try {
                    await adminService.deleteCourse(id);
                } catch (err) {
                    alert("Error deleting course: " + err.message);
                }
            }
        };

        init();
    </script>
</body>
</html>
