<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RN-TECH</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--color-text);
        }
        .login-form {
            text-align: left;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-muted);
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--color-text);
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--color-accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--color-accent);
        }
        .login-footer {
            margin-top: 2rem;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }
        .login-footer a {
            color: var(--color-accent);
            text-decoration: none;
        }
    </style>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme">
    <div class="login-container">
        <div class="login-card reveal-fade-up">
            <h1 class="login-title">Welcome <span class="accent-color">Back</span></h1>
            <p style="color: var(--color-text-muted); margin-bottom: 2rem;">Sign in to your RN-TECH account</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            
            <div id="loginError" style="color: #ff4d4d; margin-top: 1rem; font-size: 0.9rem; display: none;"></div>
            
            <div class="login-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { authService } from './js/auth-service.js';

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = loginForm.querySelector('button');

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            loginError.style.display = 'none';

            try {
                await authService.signIn(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = error.message;
                loginError.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
