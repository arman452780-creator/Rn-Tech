<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Inbox | RN-TECH Admin</title>
    <link rel="icon" href="Favicon.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="admin-common.css">
    <style>
        .inbox-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            height: calc(100vh - 200px);
        }

        .message-list {
            background: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message-item {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .message-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .message-item.active {
            background: var(--color-accent-dim);
            border-left: 3px solid var(--color-accent);
        }

        .message-item.unread::after {
            content: '';
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 8px;
            height: 8px;
            background: var(--color-accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--color-accent);
        }

        .message-detail {
            background: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--color-text-dim);
            text-align: center;
        }

        @media (max-width: 1024px) {
            .inbox-container {
                grid-template-columns: 1fr;
            }
            .message-detail {
                display: none; /* Mobile inbox view logic can be added */
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a href="index.html" class="logo">RN-TECH<span style="color: #00f2ff;">.</span> Admin</a>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="admin-dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-students.html" class="nav-link">
                    <i class="fas fa-user-graduate"></i> <span>Students</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-courses.html" class="nav-link">
                    <i class="fas fa-book"></i> <span>Courses</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-notices.html" class="nav-link">
                    <i class="fas fa-bullhorn"></i> <span>Notices</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-gallery.html" class="nav-link">
                    <i class="fas fa-images"></i> <span>Gallery</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="admin-messages.html" class="nav-link active">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a>
            </div>
        </nav>
        <div class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Messages</h1>
                <p style="color: var(--color-text-dim); margin-top: 0.5rem;">Respond to student inquiries and support requests.</p>
            </div>
            <div class="form-input" style="width: 300px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-search" style="color: var(--color-text-dim);"></i>
                <input type="text" id="msgSearch" placeholder="Search sender..." style="background: none; border: none; color: #fff; outline: none; width: 100%;">
            </div>
        </header>

        <section class="inbox-container">
            <div class="message-list" id="messageList">
                <!-- Skeleton items -->
                <div class="message-item skeleton" style="height: 100px;"></div>
                <div class="message-item skeleton" style="height: 100px;"></div>
                <div class="message-item skeleton" style="height: 100px;"></div>
            </div>
            <div class="message-detail" id="messageDetail">
                <div class="empty-state">
                    <i class="fas fa-inbox" style="font-size: 4rem; margin-bottom: 2rem; opacity: 0.2;"></i>
                    <h3>Select a message to read</h3>
                    <p>New inquiries from the website will appear here in real-time.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { authService } from './js/auth-service.js';
        import { adminService } from './js/admin-service.js';
        import { getSupabase } from './js/supabase-client.js';

        const messageList = document.getElementById('messageList');
        const messageDetail = document.getElementById('messageDetail');
        const searchInput = document.getElementById('msgSearch');

        let messages = [];
        let activeMsgId = null;
        let realtimeChannels = [];

        async function init() {
            const user = await authService.getCurrentUser();
            if (!user) { window.location.href = 'admin-login.html'; return; }
            
            loadMessages();
            setupRealtime();
            console.log("Messages Loaded");
        
        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                if (realtimeChannels.length > 0) {
                    const supabase = getSupabase();
                    for (const channel of realtimeChannels) {
                        await supabase.removeChannel(channel);
                    }
                    console.log("Realtime Subscriptions Removed");
                }
                await authService.signOut();
                console.log("Redirecting To Admin Login");
                window.location.replace('admin-login.html');
            } catch (err) {
                console.error('Logout error:', err);
                window.location.replace('admin-login.html');
            }
        });
        }

        async function loadMessages() {
            try {
                messages = await adminService.getAllMessages();
                renderMessageList();
            } catch (err) {
                console.error("Load failed:", err);
            }
        }

        function renderMessageList() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = messages.filter(m => (m.sender_name || m.name || '').toLowerCase().includes(searchTerm));

            if (filtered.length === 0) {
                messageList.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--color-text-dim);">No messages found.</div>';
                return;
            }

            messageList.innerHTML = filtered.map(m => `
                <div class="message-item ${m.id === activeMsgId ? 'active' : ''} ${m.status === 'unread' ? 'unread' : ''}" onclick="viewMessage('${m.id}')">
                    <div style="font-weight: 600; margin-bottom: 5px;">${m.sender_name || m.name || 'Anonymous'}</div>
                    <div style="font-size: 0.8rem; color: var(--color-text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${m.message}</div>
                    <div style="font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: 10px;">${new Date(m.created_at).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        window.viewMessage = async (id) => {
            activeMsgId = id;
            const m = messages.find(x => x.id === id);
            if (!m) return;

            renderMessageList();

            if (m.status === 'unread') {
                await adminService.updateMessageStatus(id, 'read');
                m.status = 'read';
                renderMessageList();
            }

            messageDetail.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h2 style="margin: 0 0 5px;">${m.sender_name || m.name || 'Anonymous'}</h2>
                        <p style="color: var(--color-accent); font-size: 0.9rem;">${m.sender_email || m.email || 'No Email'}</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 0.8rem; color: var(--color-text-dim);">${new Date(m.created_at).toLocaleString()}</span>
                    </div>
                </div>
                
                <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--color-border); padding: 2rem; border-radius: 16px; min-height: 200px; line-height: 1.6;">
                    ${m.message}
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button class="btn-primary" onclick="window.location.href='mailto:${m.sender_email || m.email}'">
                        <i class="fas fa-reply"></i> Reply via Email
                    </button>
                    <button class="btn-outline" onclick="deleteMsg('${m.id}')" style="color: #ff4d4d; border-color: #ff4d4d;">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                    <button class="btn-outline" onclick="markResolved('${m.id}')">
                        <i class="fas fa-check-circle"></i> Mark as Resolved
                    </button>
                </div>
            `;
        };

        window.deleteMsg = async (id) => {
            if (confirm("Delete this message permanently?")) {
                try {
                    await adminService.deleteMessage(id);
                    messageDetail.innerHTML = '<div class="empty-state"><h3>Message Deleted</h3></div>';
                } catch (err) {
                    alert("Delete failed");
                }
            }
        };

        window.markResolved = async (id) => {
            try {
                await adminService.updateMessageStatus(id, 'resolved');
                alert("Marked as resolved");
                loadMessages();
            } catch (err) {
                alert("Update failed");
            }
        };

        function setupRealtime() {
            const supabase = getSupabase();
            const c1 = supabase.channel('msg-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            }).subscribe();
            
            // Also for contact_messages
            const c2 = supabase.channel('cmsg-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'contact_messages' }, () => {
                loadMessages();
            }).subscribe();

            realtimeChannels = [c1, c2];
            console.log("Realtime Subscription Active");
        }

        searchInput.addEventListener('input', renderMessageList);

        init();
    </script>
</body>
</html>
